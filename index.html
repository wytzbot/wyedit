<!DOCTYPE html>
<html lang="en" class="h-full bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WyEdit | Professional Image Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass { background: rgba(18, 18, 22, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(255, 122, 0, 0.4); }
        .gradient-text { background: linear-gradient(to right, #ff7a00, #ffb300); -webkit-background-clip: text; color: transparent; }
    </style>
</head>
<body class="h-full text-white font-sans overflow-hidden">

<!-- Sidebar -->
<div id="sidebar" class="fixed inset-y-0 left-0 w-72 glass z-50 -translate-x-full transition-transform duration-300 p-6">
    <h2 class="text-2xl font-black mb-8 gradient-text">WyEdit Menu</h2>
    <nav class="space-y-4">
        <button onclick="app.showPage('home')" class="w-full text-left p-3 hover:bg-white/10 rounded-xl">Home</button>
        <button onclick="app.showPage('my-projects')" class="w-full text-left p-3 hover:bg-white/10 rounded-xl">My Projects</button>
        <button onclick="app.showHelp()" class="w-full text-left p-3 hover:bg-white/10 rounded-xl text-brand">How to Use (FAQs)</button>
    </nav>
</div>

<!-- Main App -->
<div class="h-full flex flex-col">
    <header class="p-4 flex items-center gap-4 border-b border-white/10">
        <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')">
            <i data-lucide="menu"></i>
        </button>
        <h1 class="font-bold text-xl">Dashboard</h1>
    </header>

    <main id="view-container" class="flex-1 p-6 overflow-y-auto">
        <!-- Views will be injected here -->
    </main>
</div>

<!-- Scripts -->
<script>
    class App {
        constructor() {
            this.showPage('home');
            lucide.createIcons();
        }

        showPage(page) {
            const container = document.getElementById('view-container');
            if(page === 'home') {
                container.innerHTML = `
                    <div class="max-w-2xl mx-auto space-y-6 text-center">
                        <h2 class="text-4xl font-black">Welcome to WyEdit</h2>
                        <button onclick="app.createNewProject()" class="w-full py-4 bg-orange-600 rounded-2xl font-bold btn-glow">Start Editing</button>
                    </div>
                `;
            }
            document.getElementById('sidebar').classList.add('-translate-x-full');
        }

        createNewProject() {
            // Logic to trigger file input
            alert("Upload your image to begin.");
        }

        // Dedicated Save Function - No Ticking, Just Action
        async saveProject() {
            const btn = document.getElementById('save-btn');
            btn.classList.replace('bg-neutral-800', 'bg-green-600');
            btn.innerText = "Project Saved!";
            // Logic to store in IndexedDB
            console.log("Project saved to gallery.");
        }

        // Separate Download Function
        triggerDownload() {
            alert("Downloading file...");
            // Standard download logic
        }

        showHelp() {
            alert("FAQs:\n1. Save: Use the 'Save' button to store your work in 'My Projects'.\n2. Download: Use the 'Download' button to export directly.\n3. Edits: You can resume projects from the Gallery.");
        }
    }

    const app = new App();
</script>
</body>
</html>
